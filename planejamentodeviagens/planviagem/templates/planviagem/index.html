<!DOCTYPE html>
<html>
<head>
    <title>Lista</title>
</head>
<body>
    <h3>Destinos Salvos</h3>
    <table border="1">
        <thead>
            <th>Destino</th>
            <th>Transporte</th>
        </thead>
        {% for viagem in viagens %}
        <tr>
            <td>{{viagem.destino}}</td>
            <td>{{viagem.transporte}}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
